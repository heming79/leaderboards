<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Provider Leaderboards</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Provider Leaderboards</h1>
            <p class="subtitle">Compare AI model providers by performance, price, and speed</p>
        </header>

        <div class="controls">
            <div class="sort-controls">
                <label for="sortBy">Sort by:</label>
                <select id="sortBy">
                    <option value="intelligence_index">Intelligence Index</option>
                    <option value="coding_index">Coding Index</option>
                    <option value="agentic_index">Agentic Index</option>
                    <option value="price_per_1k_input">Price (Input)</option>
                    <option value="price_per_1k_output">Price (Output)</option>
                    <option value="latency_ms">Latency</option>
                    <option value="throughput_tokens_per_sec">Throughput</option>
                </select>
                <select id="sortOrder">
                    <option value="desc">Descending</option>
                    <option value="asc">Ascending</option>
                </select>
            </div>
            <button id="refreshBtn" class="btn">Refresh Data</button>
        </div>

        <div class="table-container">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Provider</th>
                        <th>Intelligence Index</th>
                        <th>Coding Index</th>
                        <th>Agentic Index</th>
                        <th>Price/1K Input</th>
                        <th>Price/1K Output</th>
                        <th>Latency (ms)</th>
                        <th>Throughput (tokens/s)</th>
                        <th>Models</th>
                    </tr>
                </thead>
                <tbody id="providerTableBody">
                    <tr>
                        <td colspan="10" class="loading">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prevBtn" class="btn" disabled>Previous</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button id="nextBtn" class="btn" disabled>Next</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
